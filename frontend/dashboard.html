<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="URL Shortener dashboard — create and manage short links." />
    <title>Dashboard | URL Shortener</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <!-- Navigation -->
      <header class="navbar">
        <div class="container navbar__inner">
          <a href="dashboard.html" class="navbar__brand">
            <span class="navbar__brand-icon" aria-hidden="true">🔗</span>
            URL Shortener
          </a>

          <button
            class="nav-toggle"
            id="navToggle"
            aria-label="Toggle navigation menu"
            aria-expanded="false"
          >
            <span class="nav-toggle__bar"></span>
            <span class="nav-toggle__bar"></span>
            <span class="nav-toggle__bar"></span>
          </button>

          <ul class="navbar__links" id="navLinks">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li>
              <button id="logoutBtn" class="btn btn--outline btn--sm">Logout</button>
            </li>
          </ul>
        </div>
      </header>

      <!-- Dashboard -->
      <main class="dashboard-section">
        <div class="container">
          <article class="card card--wide">
            <header class="dashboard-header">
              <h1 class="dashboard-header__title">
                Welcome, <span id="welcomeUser">User</span>!
              </h1>
            </header>

            <div id="messageBox" class="message" role="alert" aria-live="polite"></div>

            <!-- URL Shortening Form -->
            <form id="shortenForm" class="url-form" novalidate>
              <div class="form-group">
                <label for="originalUrl" class="form-label">Enter Long URL</label>
                <div class="url-form__row">
                  <input
                    type="url"
                    id="originalUrl"
                    name="originalUrl"
                    class="form-input"
                    placeholder="https://example.com/very/long/url"
                    required
                  />
                  <button type="submit" id="shortenBtn" class="btn btn--primary">
                    Shorten URL
                  </button>
                </div>
              </div>
            </form>

            <!-- Result Display -->
            <section id="resultBox" class="result-box" aria-live="polite">
              <h2 class="result-box__title">Your Shortened URL</h2>

              <div class="result-item">
                <p class="result-item__label">Original URL</p>
                <p id="originalUrlResult" class="result-item__value"></p>
              </div>

              <div class="result-item">
                <p class="result-item__label">Short URL</p>
                <p id="shortUrlResult" class="result-item__value result-item__value--short"></p>
              </div>

              <div class="result-actions">
                <button type="button" id="copyBtn" class="btn btn--success btn--sm">
                  Copy Short URL
                </button>
                <span id="copyFeedback" class="copy-feedback">Copied to clipboard!</span>
              </div>
            </section>
          </article>
        </div>
      </main>

      <!-- Footer -->
      <footer class="footer">
        <div class="container">
          <p>
            &copy; 2026 URL Shortener &mdash; Built with
            <a href="#">Spring Boot</a>
          </p>
        </div>
      </footer>
    </div>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
      const navToggle = document.getElementById("navToggle");
      const navLinks = document.getElementById("navLinks");
      navToggle.addEventListener("click", () => {
        navLinks.classList.toggle("active");
      });
    </script>
  </body>
</html>
