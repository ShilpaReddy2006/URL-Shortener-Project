<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Login to your URL Shortener account." />
    <title>Login | URL Shortener</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <!-- Navigation -->
      <header class="navbar">
        <div class="container navbar__inner">
          <a href="index.html" class="navbar__brand">
            <span class="navbar__brand-icon" aria-hidden="true">🔗</span>
            URL Shortener
          </a>

          <button
            class="nav-toggle"
            id="navToggle"
            aria-label="Toggle navigation menu"
            aria-expanded="false"
          >
            <span class="nav-toggle__bar"></span>
            <span class="nav-toggle__bar"></span>
            <span class="nav-toggle__bar"></span>
          </button>

          <ul class="navbar__links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="register.html">Register</a></li>
          </ul>
        </div>
      </header>

      <!-- Login Form -->
      <main class="auth-section">
        <div class="container">
          <article class="card">
            <header class="card__header">
              <h1 class="card__title">Welcome Back</h1>
              <p class="card__subtitle">Login to manage your short URLs</p>
            </header>

            <div id="messageBox" class="message" role="alert" aria-live="polite"></div>

            <form id="loginForm" novalidate>
              <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input
                  type="text"
                  id="username"
                  name="username"
                  class="form-input"
                  placeholder="Enter your username"
                  autocomplete="username"
                  required
                />
              </div>

              <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input
                  type="password"
                  id="password"
                  name="password"
                  class="form-input"
                  placeholder="Enter your password"
                  autocomplete="current-password"
                  required
                />
              </div>

              <button type="submit" id="loginBtn" class="btn btn--primary btn--block">
                Login
              </button>
            </form>

            <p class="form-footer">
              Don't have an account?
              <a href="register.html">Register here</a>
            </p>
          </article>
        </div>
      </main>

      <!-- Footer -->
      <footer class="footer">
        <div class="container">
          <p>
            &copy; 2026 URL Shortener &mdash; Built with
            <a href="#">Spring Boot</a>
          </p>
        </div>
      </footer>
    </div>

    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
    <script>
      const navToggle = document.getElementById("navToggle");
      const navLinks = document.getElementById("navLinks");
      navToggle.addEventListener("click", () => {
        navLinks.classList.toggle("active");
      });
    </script>
  </body>
</html>
